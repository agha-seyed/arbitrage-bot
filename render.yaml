services:
  - type: web
    name: arbitrage-bot
    env: docker
    plan: free
    dockerCommand: "python main.py"
    healthCheckPath: "/"
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENABLE_AUTO_BETTING
        value: "false"
